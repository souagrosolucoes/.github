name: Code Review IA (reusable)

# Reusable workflow consumed by every souagrosolucoes/* repo via:
#
#   jobs:
#     review:
#       if: github.event.label.name == 'code-review-ia'
#       uses: souagrosolucoes/.github/.github/workflows/code-review-ia.yml@main
#       secrets: inherit
#
# Runs the official anthropics/claude-code-action with the official
# `code-review` plugin (Anthropic Verified). The plugin orchestrates
# multiple specialized agents — CLAUDE.md compliance, bug detection,
# historical context, PR history, code comments — with confidence-based
# scoring to filter false positives. It auto-detects the current PR via
# the GitHub CLI; we only invoke `/code-review` from the prompt.
#
# CLAUDE.md (and any nested CLAUDE.md files) of the consumer repo is
# read automatically by the plugin, so project-specific conventions
# stay co-located with each codebase — this workflow is intentionally
# generic.

on:
  workflow_call:
    inputs:
      model:
        description: "Claude model to use. Defaults to Sonnet 4.6."
        type: string
        required: false
        default: "claude-sonnet-4-6"
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Full history allows the plugin to look at git blame and PR history.
          fetch-depth: 0

      - name: Run /code-review (Anthropic plugin)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Anthropic-maintained marketplace + plugin (verified). The plugin
          # reads each consumer repo's CLAUDE.md automatically.
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-public.git
          plugins: |
            code-review@claude-plugins-official

          claude_args: |
            --model ${{ inputs.model }}

          prompt: |
            Execute o comando `/code-review` neste pull request.

            O output da revisão deve estar em pt-BR e seguir o
            `CLAUDE.md` do repositório (raiz e subpastas, quando houver).
