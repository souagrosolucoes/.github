name: Code Review IA (reusable)

# Reusable workflow consumed by every souagrosolucoes/* repo via:
#
#   jobs:
#     review:
#       if: github.event.label.name == 'code-review-ia'
#       uses: souagrosolucoes/.github/.github/workflows/code-review-ia.yml@main
#       secrets: inherit
#
# Runs the official anthropics/claude-code-action against the PR that
# received the label, posting inline review comments and a summary. The
# action reads each consumer repo's CLAUDE.md (and any nested CLAUDE.md
# files) automatically, so project-specific conventions stay co-located
# with each codebase — this workflow is intentionally generic.

on:
  workflow_call:
    inputs:
      model:
        description: "Claude model to use. Defaults to Sonnet 4.6."
        type: string
        required: false
        default: "claude-sonnet-4-6"
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model ${{ inputs.model }}
          prompt: |
            Você é um revisor sênior. Faça a revisão do pull request atual
            seguindo as convenções deste repositório (descritas no `CLAUDE.md`
            da raiz e nos `CLAUDE.md` por subprojeto, quando existirem).

            Idioma da revisão: pt-BR. Tom direto e profissional.

            ## O que apontar (em ordem de prioridade)

            1. **Bugs reais que vão pra produção**: race conditions,
               null/undefined errors, queries com problemas (N+1, lock
               indevido, índice ausente), regressões de comportamento,
               vazamento de dados/credenciais.

            2. **Risco de segurança**: SQL injection, XSS, secrets em
               plaintext, autenticação/autorização bypassada, CORS aberto
               em produção.

            3. **Violações dos padrões documentados** no `CLAUDE.md` deste
               repo. Não invente regras que não estejam lá.

            ## O que NÃO apontar

            - Formatação, naming, ordem de imports — Prettier/ESLint cobrem.
            - Ausência de testes se o CI do repo já passou.
            - Bikeshed (preferências subjetivas sem impacto funcional).
            - Itens já levantados por outros revisores.

            ## Formato

            - Use **inline review comments** quando o problema for específico
              de uma ou poucas linhas.
            - Termine com um **summary** estruturado:
              - 🔴 **Crítico** (bloqueia merge)
              - 🟡 **Sugestão** (vale revisar mas não bloqueia)
              - 🟢 **Pontos positivos** (até 3, opcional)
            - Se o PR está bom, declare em uma frase no summary e não
              invente apontamentos.

            Confiamos no julgamento humano. Apontamentos seus são entrada
            para discussão, não veredicto.
