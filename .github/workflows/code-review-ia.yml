name: Code Review IA (reusable)

# Reusable workflow consumed by every safracontrol-* repo via:
#
#   jobs:
#     review:
#       if: github.event.label.name == 'code-review-ia'
#       uses: souagrosolucoes/.github/.github/workflows/code-review-ia.yml@main
#       secrets: inherit
#
# It runs the official anthropics/claude-code-action against the PR that
# received the label, posting inline review comments and a summary. The
# action reads CLAUDE.md from the consumer repo automatically, so guidelines
# stay co-located with each codebase.

on:
  workflow_call:
    inputs:
      model:
        description: "Claude model to use. Defaults to Sonnet 4.6."
        type: string
        required: false
        default: "claude-sonnet-4-6"
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # The full history is not needed; depth 1 is enough for the diff.
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model ${{ inputs.model }}
          prompt: |
            Você é um revisor sênior do código deste repositório. Faça a revisão
            do pull request atual seguindo as convenções descritas em CLAUDE.md
            (raiz do repo) e nos demais arquivos `CLAUDE.md` por subprojeto, se
            existirem.

            Idioma da revisão: pt-BR. Tom direto e profissional.

            ## O que apontar (em ordem de prioridade)

            1. **Bugs reais** que vão para produção:
               race conditions, NullPointer/undefined, queries N+1, locks
               indevidos, vazamento de credenciais, vazamento de dados entre
               tenants, regressões de comportamento sem teste.

            2. **Violações dos padrões deste repo** documentados em CLAUDE.md.
               Exemplos típicos no `safracontrol-api`:
               - Mistura V1 (Hasura `_eq`) e V2 (NestJS-Query `eq`).
               - Uso de `console.log` em vez de `PinoLogger` injetado.
               - `repository.manager.transaction()` em vez de `runTransaction`.
               - Missing `@Authorize(<EntityAuthorizer>)` em DTOs novos.
               - Query V2 sem `context: { apiVersion: 'v2' }`.
               - `synchronize: true` no TypeORM.
               - Falta de filtro multi-tenant em queries diretas.

            3. **Risco de segurança ou multi-tenant**:
               SQL injection, vazamento de dados entre tenants, secrets em
               plaintext, escapes de RBAC, CORS aberto em produção.

            ## O que NÃO apontar

            - Formatação, naming, ordem de imports — Prettier/ESLint cobrem.
            - Ausência de testes se o `pr-check.yml` já passou.
            - Bikeshed (preferências subjetivas sem impacto funcional).
            - Itens já levantados por outros revisores no PR.

            ## Formato

            - Use **inline review comments** (uma observação por linha)
              quando o problema for específico de uma linha.
            - No fim, deixe um **summary** estruturado com:
              - 🔴 Crítico (bloqueia merge)
              - 🟡 Sugestão (vale revisar mas não bloqueia)
              - 🟢 Pontos positivos (1-3 itens, opcional)
            - Se o PR estiver bom, declare isso em uma frase no summary e
              não invente apontamentos.

            Lembrete: confiamos no julgamento humano. Apontamentos seus são
            entrada para discussão, não veredicto.
