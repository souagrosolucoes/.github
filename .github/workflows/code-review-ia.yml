name: Code Review IA (reusable)

# Reusable workflow consumed by every souagrosolucoes/* repo via:
#
#   jobs:
#     review:
#       if: github.event.label.name == 'code-review-ia'
#       uses: souagrosolucoes/.github/.github/workflows/code-review-ia.yml@main
#       secrets: inherit
#
# Runs the official anthropics/claude-code-action with the
# `superpowers` plugin (Anthropic Verified). The plugin exposes a
# library of skills; for PR review we invoke
# `superpowers:requesting-code-review`, which inspects the diff with
# technical rigor and posts verifiable findings instead of performative
# agreement. It auto-detects the current PR via the GitHub CLI.
#
# CLAUDE.md (and any nested CLAUDE.md files) of the consumer repo is
# read automatically by the skill, so project-specific conventions
# stay co-located with each codebase — this workflow is intentionally
# generic.

on:
  workflow_call:
    inputs:
      model:
        description: "Claude model to use. Defaults to Sonnet 4.6."
        type: string
        required: false
        default: "claude-sonnet-4-6"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "OAuth token from `claude setup-token` (Pro/Max subscription). Passed to the action via the dedicated `claude_code_oauth_token` input — distinct from `anthropic_api_key`."
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Full history allows the plugin to look at git blame and PR history.
          fetch-depth: 0

      - name: Run code review (superpowers skill)
        uses: anthropics/claude-code-action@v1
        with:
          # TEMPORARY: surface skill output in workflow logs while we
          # validate the end-to-end flow. Roll back once reviews are
          # consistently posting on PRs.
          show_full_output: "true"
          # Authenticate via Pro/Max subscription OAuth token (input dedicated
          # to OAuth — distinct from anthropic_api_key). Draws from the
          # subscription quota instead of API tier limits, avoiding the
          # input tokens/min cap on lower API tiers.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Anthropic-maintained marketplace + plugin (verified). The plugin
          # reads each consumer repo's CLAUDE.md automatically.
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            superpowers@claude-plugins-official

          # Allowlist for tools the skill actually needs.
          #
          # `Bash` is broad on purpose: the requesting-code-review skill's
          # investigation steps rely on compound shell (pipes, `&&`, `$(...)`,
          # `for`, `xargs`, `find -exec`) that prefix-matched allowlists like
          # `Bash(git:*)` would deny. The job runs in an ephemeral GitHub
          # Actions runner with only the GITHUB_TOKEN granted by `permissions`
          # at the top of this workflow (contents:read, pull-requests:write,
          # issues:write), so the blast radius of a broad Bash allowance is
          # bounded by what that token can do — not by anything persistent.
          #
          # Edit/Write/MultiEdit and similar mutating tools are NOT listed,
          # so the action cannot push commits or modify the repo.
          settings: |
            {
              "permissions": {
                "allow": [
                  "Skill",
                  "Read",
                  "Grep",
                  "Glob",
                  "Bash"
                ]
              }
            }

          claude_args: |
            --model ${{ inputs.model }}

          prompt: |
            Faça a revisão do pull request **#${{ github.event.pull_request.number }}**
            (especificamente este PR, não outros PRs abertos no repo)
            usando a skill `superpowers:requesting-code-review` via tool `Skill`.
            Use `gh pr view ${{ github.event.pull_request.number }}` e
            `gh pr diff ${{ github.event.pull_request.number }}` para obter
            metadados e diff — não use `gh pr list` ou "most recent open PR",
            esse comportamento causa skip indevido em repositórios com múltiplos
            PRs abertos.

            Considere o `CLAUDE.md` do repositório (raiz e subpastas, quando
            houver) como fonte de convenções e contextos específicos do
            projeto — é a partir dele que você deve inferir riscos relevantes
            (segurança, multi-tenant, contratos com integrações, etc.).

            ### Comportamento obrigatório

            Após a skill terminar — **independentemente** do resultado dela
            (mesmo que não encontre apontamentos relevantes, mesmo que
            considere o PR inelegível) — você **DEVE** fazer DOIS passos:

            1. Aplicar UMA das labels de risco no PR (e remover labels
               `risk:*` antigas, se existirem, para evitar acúmulo entre
               execuções).
            2. Para CADA apontamento encontrado pela skill, postar um
               **comentário inline de review** ancorado no arquivo/linha
               relevante, incluindo um bloco ` ```suggestion ` quando o fix
               for mecânico (rename, parâmetro, sintaxe, redact, remoção
               de log, etc.). Quando o apontamento for refactor amplo,
               decisão de design ou risco arquitetural, poste só a
               explicação — não force uma `suggestion` ruim.
            3. Postar UM comentário consolidado APENAS quando não houver
               apontamentos inline (skill não achou nada relevante OU PR
               considerado inelegível). Quando já houver inline comments,
               não poste o consolidado — a label e os inline comments já
               cobrem o status.

            #### Classificação de criticidade

            Antes de escrever o comentário, classifique o PR em UM dos níveis
            abaixo. O nível define a label aplicada **e** o emoji do título do
            comentário. Use estes critérios objetivos:

            - 🔴 **Crítico** (label `risk:critical`) — quando a skill encontra
              1+ apontamento de alta confiança, OU a análise de impacto
              identifica risco alto de produção (migration destrutiva,
              breaking change não comunicada, vazamento de credencial,
              regressão evidente). Sugere **não mergear sem mitigação**.
            - 🟡 **Atenção** (label `risk:attention`) — quando há pontos
              relevantes a revisar com cuidado (mudança de contrato, escopo
              amplo, risco médio de produção), mesmo sem apontamento crítico
              da skill. Sugere **review humano caprichado**.
            - 🟢 **OK** (label `risk:ok`) — análise de impacto baixa + skill
              sem apontamentos relevantes. Sugere **prosseguir com merge
              normal**.
            - ⚪ **Informativo** (label `risk:trivial`) — PR trivial (docs,
              comentários, formatação, version bump). Apenas registro de que
              IA passou.

            #### Como aplicar a label

            Antes de criar a label, garanta que ela existe no repo (idempotente):

            ```bash
            gh label create risk:critical  --color B60205 --description "Code Review IA: risco crítico"     --force 2>/dev/null || true
            gh label create risk:attention --color FBCA04 --description "Code Review IA: atenção"          --force 2>/dev/null || true
            gh label create risk:ok        --color 0E8A16 --description "Code Review IA: ok"               --force 2>/dev/null || true
            gh label create risk:trivial   --color C5DEF5 --description "Code Review IA: informativo"      --force 2>/dev/null || true
            ```

            Em seguida, remova labels `risk:*` antigas do PR e adicione a
            label do nível classificado:

            ```bash
            PR=${{ github.event.pull_request.number }}
            for L in risk:critical risk:attention risk:ok risk:trivial; do
              gh pr edit "$PR" --remove-label "$L" 2>/dev/null || true
            done
            gh pr edit "$PR" --add-label "<LABEL_DO_NIVEL>"
            ```

            Substitua `<LABEL_DO_NIVEL>` por exatamente uma de
            `risk:critical`, `risk:attention`, `risk:ok` ou `risk:trivial`,
            conforme a classificação definida acima.

            #### Como postar comentários inline por apontamento

            Para cada apontamento com arquivo/linha identificáveis, use a
            API REST do GitHub via `gh api`. O `commit_id` é o HEAD SHA do
            PR:

            ```bash
            PR=${{ github.event.pull_request.number }}
            REPO="${GITHUB_REPOSITORY}"   # owner/repo
            SHA=$(gh pr view "$PR" --json headRefOid -q .headRefOid)

            # Comentário inline com suggestion (fix mecânico)
            gh api "repos/${REPO}/pulls/${PR}/comments" -X POST \
              -f commit_id="$SHA" \
              -f path="<caminho/do/arquivo>" \
              -F line=<linha> \
              -f side="RIGHT" \
              -f body="$(cat <<'EOF'
            <Descrição curta do problema em pt-BR, citando a regra/CLAUDE.md quando aplicável.>

            ```suggestion
            <conteúdo exato da(s) linha(s) corrigida(s)>
            ```
            EOF
            )"

            # Comentário inline sem suggestion (decisão de design / risco arquitetural)
            gh api "repos/${REPO}/pulls/${PR}/comments" -X POST \
              -f commit_id="$SHA" \
              -f path="<caminho/do/arquivo>" \
              -F line=<linha> \
              -f side="RIGHT" \
              -f body="<Descrição do risco/decisão a discutir, sem propor código.>"
            ```

            Regras:
            - Use `suggestion` **só** quando você consegue produzir as
              linhas corrigidas exatas que substituem as linhas atuais. O
              conteúdo do `suggestion` deve ser o trecho final pronto para
              commit (sem `+`/`-` de diff).
            - Para apontamentos multi-linha, use `start_line` + `line` no
              `gh api` e abranja só o intervalo necessário.
            - Se o apontamento não tem âncora clara em uma linha do diff
              (ex.: ausência de arquivo, política de PR), inclua-o no
              **comentário consolidado de fallback** descrito abaixo, não
              tente forçar inline.

            #### Comentário consolidado (apenas como fallback)

            Quando NÃO houver apontamentos inline a postar (skill não achou
            nada relevante OU PR foi considerado inelegível), poste UM
            comentário no PR via
            `gh pr comment ${{ github.event.pull_request.number }} --body-file <arquivo>`
            no formato abaixo (pt-BR, sem outros emojis além do de
            criticidade):

            ```markdown
            ### Code Review IA — <EMOJI_CRITICIDADE> <Label>

            **Resumo:** <1-2 frases descrevendo o que o PR faz, com base no diff>

            **Apontamentos:** Nenhum apontamento relevante foi encontrado.
            <OU "PR considerado inelegível para revisão automática (motivo: <motivo>)." se aplicável>

            ---
            Revisão automatizada. Classificação heurística — entrada para discussão.
            ```

            Diretrizes:
            - Se a skill postou seu próprio comentário, ainda assim siga
              este fluxo (inline por apontamento + label).
            - Não use `run-id`/timestamps — só conteúdo do PR.
