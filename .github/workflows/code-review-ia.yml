name: Code Review IA (reusable)

# Reusable workflow consumed by every souagrosolucoes/* repo via:
#
#   jobs:
#     review:
#       if: github.event.label.name == 'code-review-ia'
#       uses: souagrosolucoes/.github/.github/workflows/code-review-ia.yml@main
#       secrets: inherit
#
# Runs the official anthropics/claude-code-action with the official
# `code-review` plugin (Anthropic Verified). The plugin orchestrates
# multiple specialized agents — CLAUDE.md compliance, bug detection,
# historical context, PR history, code comments — with confidence-based
# scoring to filter false positives. It auto-detects the current PR via
# the GitHub CLI; we only invoke `/code-review` from the prompt.
#
# CLAUDE.md (and any nested CLAUDE.md files) of the consumer repo is
# read automatically by the plugin, so project-specific conventions
# stay co-located with each codebase — this workflow is intentionally
# generic.

on:
  workflow_call:
    inputs:
      model:
        description: "Claude model to use. Defaults to Sonnet 4.6."
        type: string
        required: false
        default: "claude-sonnet-4-6"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "OAuth token from `claude setup-token` (Pro/Max subscription). Passed to the action via the dedicated `claude_code_oauth_token` input — distinct from `anthropic_api_key`."
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Full history allows the plugin to look at git blame and PR history.
          fetch-depth: 0

      - name: Run /code-review (Anthropic plugin)
        uses: anthropics/claude-code-action@v1
        with:
          # TEMPORARY: surface plugin output in workflow logs while we
          # validate the end-to-end flow. Roll back once reviews are
          # consistently posting on PRs.
          show_full_output: "true"
          # Authenticate via Pro/Max subscription OAuth token (input dedicated
          # to OAuth — distinct from anthropic_api_key). Draws from the
          # subscription quota instead of API tier limits, which avoids the
          # 30k input tokens/min cap on Tier 1 that the multi-agent
          # code-review plugin was hitting.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Anthropic-maintained marketplace + plugin (verified). The plugin
          # reads each consumer repo's CLAUDE.md automatically.
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-public.git
          plugins: |
            code-review@claude-plugins-official

          # Allowlist for tools the plugin actually needs.
          #
          # `Bash` is broad on purpose: the code-review plugin's investigation
          # agents rely on compound shell (pipes, `&&`, `$(...)`, `for`,
          # `xargs`, `find -exec`) that prefix-matched allowlists like
          # `Bash(git:*)` would deny. The job runs in an ephemeral GitHub
          # Actions runner with only the GITHUB_TOKEN granted by `permissions`
          # at the top of this workflow (contents:read, pull-requests:write,
          # issues:write), so the blast radius of a broad Bash allowance is
          # bounded by what that token can do — not by anything persistent.
          #
          # Edit/Write/MultiEdit and similar mutating tools are NOT listed,
          # so the action cannot push commits or modify the repo.
          settings: |
            {
              "permissions": {
                "allow": [
                  "Skill",
                  "Read",
                  "Grep",
                  "Glob",
                  "Bash"
                ]
              }
            }

          claude_args: |
            --model ${{ inputs.model }}

          prompt: |
            Execute `/code-review` no pull request **#${{ github.event.pull_request.number }}**
            (especificamente este PR, não outros PRs abertos no repo).
            Use `gh pr view ${{ github.event.pull_request.number }}` em qualquer
            sub-agente de elegibilidade — não use `gh pr list` ou "most recent
            open PR", esse comportamento causa skip indevido em repositórios
            com múltiplos PRs abertos.

            Considere o `CLAUDE.md` do repositório (raiz e subpastas, quando
            houver) como fonte de convenções e contextos específicos do
            projeto — é a partir dele que você deve inferir riscos relevantes
            (segurança, multi-tenant, contratos com integrações, etc.).

            ### Comportamento obrigatório

            Após `/code-review` terminar — **independentemente** do resultado
            dele (mesmo que filtre todos os issues por confidence < 80, mesmo
            que silencie por elegibilidade) — você **DEVE** postar exatamente
            UM comentário no PR via
            `gh pr comment ${{ github.event.pull_request.number }} --body-file <arquivo>`
            seguindo **exatamente** este formato (em pt-BR, sem emojis):

            ```markdown
            ### Code Review IA

            **Resumo das mudanças**
            <1-2 frases descrevendo o que o PR faz, com base no diff>

            **Análise de impacto**
            - Componentes/módulos afetados: <lista breve>
            - Possíveis quebras de contrato (API, schema, eventos, env vars, etc.): <lista ou "Nenhuma identificada">
            - Riscos de produção (migration, rollback, escala horizontal, downtime, dependências externas): <breve>
            - Outros riscos relevantes ao contexto do repo (extraídos do CLAUDE.md, quando aplicável): <breve ou "Nenhum">

            **Apontamentos do /code-review**
            <Lista do plugin com confidence >=80, OU "Nenhum apontamento com confiança suficiente foi encontrado pelo plugin." se filtrou tudo, OU "PR considerado inelegível para revisão automática (motivo: <motivo>)." se silenciou na elegibilidade>

            ---
            🤖 Revisão automatizada (Claude). Apontamentos são entrada para discussão, não veredicto.
            ```

            Diretrizes:
            - Se o `/code-review` postou seu próprio comentário, ainda assim poste o seu nesse formato (são complementares).
            - Para o link de cada apontamento, use sha completo do commit (ver instruções do `/code-review` sobre formato de link).
            - Não use ``run-id``/timestamps — só conteúdo do PR.
